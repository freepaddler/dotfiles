[mgr]
ratio = [1,3,4]
show_symlink = true

[preview]
wrap = "yes"
tab_size = 2
image_delay = 100

[tasks]
image_bound = [0,0]

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'
group = "default"

[[plugin.prepend_fetchers]]
id   = "git"
url = "*"
run  = "git"
group = "default"

[[plugin.prepend_fetchers]]
id   = "git"
url = "*/"
run  = "git"
group = "default"
